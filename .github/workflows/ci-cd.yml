name: CI/CD Automatisé

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

env:
  TERMUX_LOGS_DIR: $HOME/.local/share/roulotte-termux/logs

jobs:
  test-and-lint:
    name: 🧪 Tests Automatisés & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        run: |
          mkdir -p "$TERMUX_LOGS_DIR"
          sudo apt-get update
          sudo apt-get install -y shellcheck
      
      - name: Lint Bash Scripts
        run: find . -name "*.sh" -type f -exec shellcheck -x -e SC1091 {} +
      
      - name: Execute Dry-Run Tests
        run: |
          mkdir -p "$TERMUX_LOGS_DIR"
          shopt -s nullglob
          scripts=(scripts/mobile/*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "ℹ️ Aucun script trouvé dans scripts/mobile/"
            exit 0
          fi
          for script in "${scripts[@]}"; do
            echo "🔍 Exécution de $script en mode dry-run..."
            bash "$script" --profile standard --dry-run --verbose 2>&1 | tee "$TERMUX_LOGS_DIR/$(basename "$script").log" || echo "⚠️ $script terminé avec des avertissements"
          done

      - name: Archive Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs
          path: ${{ env.TERMUX_LOGS_DIR }}/*.log

  auto-generation:
    name: 📄 Génération Automatique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Changelog & Docs
        run: |
          mkdir -p docs
          echo "# 📜 Changelog généré automatiquement" > CHANGELOG_AUTO.md
          echo "" >> CHANGELOG_AUTO.md
          git log --pretty=format:"- %h %s (%an)" -20 >> CHANGELOG_AUTO.md || echo "- Git non disponible"
          
          echo "# 🤖 Scripts Index" > docs/SCRIPTS_INDEX.md
          echo "" >> docs/SCRIPTS_INDEX.md
          find . -name "*.sh" -type f | while read -r f; do echo "- \`$f\`" >> docs/SCRIPTS_INDEX.md; done
          
      - name: Upload Generated Files
        uses: actions/upload-artifact@v4
        with:
          name: auto-generated-docs
          path: |
            CHANGELOG_AUTO.md
            docs/SCRIPTS_INDEX.md

  deploy:
    name: 🚀 Pipeline de Déploiement
    runs-on: ubuntu-latest
    needs: [test-and-lint, auto-generation]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Release Artifacts
        run: |
          mkdir -p dist/roulotte-termux
          cp -r scripts/ dist/roulotte-termux/ 2>/dev/null || true
          cp -r docs/ dist/roulotte-termux/ 2>/dev/null || true
          cp -r .config/ dist/roulotte-termux/ 2>/dev/null || true
          tar -czf "dist/roulotte-termux-$(date +%Y%m%d%H%M%S).tar.gz" -C dist/ roulotte-termux
          
      - name: Upload Deployment Package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: dist/*.tar.gz
          
      - name: Notify Deployment Success
        run: echo "✅ Pipeline de déploiement terminé. Paquet prêt pour distribution."